#
name: Create and publish Arch Linux packages

# Configures this workflow to run every time a change is pushed to the branch called `release`.
on:
  push:
    tags:
      - current
  schedule:
    - cron: "0 4 * * *"

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-packages-publish-repo:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build packages from AUR
        id: build
        uses: marcoh00/archlinux-builder@main
        with:
          action: "build-aur"
          target: |
            ttf-ms-fonts
            visual-studio-code-bin
            protonup-qt
            tex-fmt
            bootc
            sunshine-git
            llama.cpp-vulkan
          artifacts: "output"
          packager: "archlinux-ostree-experiments <marco@wuthoehle.de>"
          gpgsign: "${{ secrets.GPG_KEY_PEM_2026 }}"
      - name: Create repository
        id: repo
        uses: marcoh00/archlinux-builder@main
        with:
          action: "build-repo"
          target: "output"
          artifacts: "marcoh00pkgs"
          gpgsign: "${{ secrets.GPG_KEY_PEM_2026 }}"
      - name: Upload release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: current
          files: |
            output/*.pkg.tar.zst
            output/*.pkg.tar.zst.sig
            output/*.db
            output/*.db.tar.zst
            output/*.files
            output/*.files.tar.zst
